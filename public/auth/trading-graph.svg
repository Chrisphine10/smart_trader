  <rect x="62" y="178" width="836" height="314" rx="22" fill="#0b111a" stroke="#263241"/>
  <rect x="88" y="204" width="784" height="252" fill="url(#grid)"/>
  <path d="M88 431C134 404 162 392 206 403C249 414 284 360 326 368C369 377 401 319 445 327C489 335 518 292 559 300C602 309 637 259 681 272C724 285 751 231 790 241C827 251 847 218 872 203V456H88Z" fill="url(#area)"/>
