<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 600" role="img" aria-labelledby="title desc">
  <title id="title">Trading graph preview</title>
  <desc id="desc">Dark trading dashboard preview with candlesticks, a market line, and performance panels.</desc>
  <defs>
    <linearGradient id="panel" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#151b26"/>
      <stop offset="1" stop-color="#0a0f17"/>
    </linearGradient>
    <linearGradient id="area" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#facc15" stop-opacity=".42"/>
      <stop offset=".58" stop-color="#22c55e" stop-opacity=".16"/>
      <stop offset="1" stop-color="#22c55e" stop-opacity="0"/>
    </linearGradient>
    <filter id="softGlow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="8" result="blur"/>
      <feColorMatrix in="blur" values="1 0 0 0 0.98 0 1 0 0 0.80 0 0 1 0 0.08 0 0 0 .8 0"/>
      <feMerge>
        <feMergeNode/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <pattern id="grid" width="64" height="48" patternUnits="userSpaceOnUse">
      <path d="M64 0H0v48" fill="none" stroke="#263241" stroke-opacity=".55" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="960" height="600" rx="34" fill="url(#panel)"/>
  <rect x="34" y="34" width="892" height="532" rx="28" fill="#0f141d" stroke="#263241" stroke-opacity=".9"/>

